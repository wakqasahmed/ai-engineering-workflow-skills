name: Open Code Review

# Auto-runs only for PRs opened by the maintainer (wakqasahmed). PRs from
# anyone else are not reviewed automatically — the maintainer can trigger a
# review manually on any PR by commenting `/ocr-review` (see
# ocr-manual-review.yml), which supports fork PRs safely since it only ever
# diffs PR content and never checks out or executes PR-supplied code.
on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  open-code-review:
    if: github.event.pull_request.user.login == 'wakqasahmed'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Validate OpenRouter credentials
        shell: bash
        env:
          OCR_LLM_URL: ${{ vars.OCR_LLM_URL }}
          OCR_LLM_TOKEN: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
          OCR_LLM_MODEL: ${{ vars.OCR_LLM_MODEL }}
        run: |
          if ! status_code=$(curl --silent --show-error --output /tmp/openrouter-preflight.json --write-out '%{http_code}' --connect-timeout 15 --max-time 30 \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${OCR_LLM_TOKEN}" \
            --data "{\"model\":\"${OCR_LLM_MODEL}\",\"messages\":[{\"role\":\"user\",\"content\":\"Reply with OK.\"}],\"max_tokens\":1}" \
            "${OCR_LLM_URL%/}/chat/completions"); then
            echo 'OpenRouter preflight request failed.'
            exit 1
          fi

          rm /tmp/openrouter-preflight.json

          if [[ "$status_code" != 2* ]]; then
            echo "OpenRouter preflight returned HTTP ${status_code}."
            exit 1
          fi

      - uses: alibaba/open-code-review@1c8f930fc923753b17b80f633aea54274fc83825 # v1.7.15
        with:
          llm_url: ${{ vars.OCR_LLM_URL }}
          llm_auth_token: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
          llm_model: ${{ vars.OCR_LLM_MODEL }}
          llm_use_anthropic: ${{ vars.OCR_USE_ANTHROPIC }}
          llm_timeout: '120'
          sticky_summary: 'true'
          incremental: 'true'
