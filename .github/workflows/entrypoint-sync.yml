name: Entrypoint sync

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  entrypoint-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify AGENTS.md and CLAUDE.md stay aligned
        shell: bash
        run: diff -u <(sed '3d' AGENTS.md) <(sed '3d' CLAUDE.md)
      - name: Verify user installer
        shell: bash
        run: scripts/test-install-user.sh
      - name: Verify skill listing
        shell: bash
        run: scripts/list-skills.sh | grep -q "skills/engineering/clarify-work/SKILL.md"
      - name: Verify plugin skill paths
        shell: bash
        run: python3 scripts/validate-plugin.py
      - name: Verify Changesets release skill
        shell: bash
        run: scripts/test-changesets-release.sh
      - name: Run subagent-pipeline behavioral eval
        shell: bash
        run: skills/engineering/subagent-pipeline/eval/run-eval.sh --dry-run
      - name: Run clarify-work behavioral eval
        shell: bash
        run: skills/engineering/clarify-work/eval/run-eval.sh
