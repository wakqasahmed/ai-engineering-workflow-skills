name: HITL blocker outcome eval

on:
  workflow_dispatch:
    inputs:
      agent:
        description: Repository-controlled target-agent executable path
        required: true
        type: string
      image:
        description: Digest-pinned evaluator image
        required: true
        type: string
      model:
        description: Declared model identifier
        required: true
        type: string

jobs:
  outcome-eval:
    environment: outcome-evals
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Run isolated enabled and disabled trials
        run: >-
          python3 skills/engineering/hitl-blocker/eval/run_harness.py
          --agent "${{ inputs.agent }}" --image "${{ inputs.image }}"
          --model "${{ inputs.model }}" --trials 5
          --output hitl-blocker-outcome-results.json
      - name: Validate outcome delta and safety threshold
        run: >-
          python3 skills/engineering/hitl-blocker/eval/validate-harness-results.py
          --results hitl-blocker-outcome-results.json --trials 5
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hitl-blocker-outcome-results
          path: hitl-blocker-outcome-results.json
          retention-days: 90
