name: Clarify-work outcome eval

on:
  workflow_dispatch:
    inputs:
      runner:
        description: Repository-controlled runner path
        required: true
        type: string
      image:
        description: Digest-pinned evaluator image
        required: true
        type: string
      model:
        description: Declared model identifier
        required: true
        type: string
      trials:
        description: Trials per case and condition (3-6)
        required: true
        default: '3'
        type: choice
        options: ['3', '4', '5', '6']

jobs:
  outcome-eval:
    environment: outcome-evals
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Run isolated enabled and disabled trials
        run: >-
          python3 skills/engineering/clarify-work/eval/run_harness.py
          --runner "${{ inputs.runner }}"
          --image "${{ inputs.image }}"
          --model "${{ inputs.model }}"
          --trials "${{ inputs.trials }}"
          --output clarify-work-outcome-results.json
      - name: Validate outcome delta and safety threshold
        run: >-
          python3 skills/engineering/clarify-work/eval/validate-harness-results.py
          --results clarify-work-outcome-results.json
          --trials "${{ inputs.trials }}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: clarify-work-outcome-results
          path: clarify-work-outcome-results.json
          retention-days: 90
